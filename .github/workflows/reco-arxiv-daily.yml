# This is a basic workflow to help you get started with Actions

name: Run Arxiv Papers Daily

# Controls when the workflow will run
on:
  # 手动触发：Actions 页选择该 workflow 后 Run workflow
  workflow_dispatch:
  # 每天 00:00 UTC 自动跑（北京时间 08:00）；可改为 0 8 * * * 等
  schedule:
    - cron: "0 0 * * *"
  # Triggers the workflow on push or pull request events only for the main branch
#   push:
#     branches:
#     - main

env:

  GITHUB_USER_NAME: ShawnBIT
  GITHUB_USER_EMAIL: 13269590132@163.com
  
  
# A workflow run is made up of one or more jobs that run sequentially or in parallel
jobs:
  build:
    name: update
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 允许 workflow 向仓库 push 提交

    steps:
      - name: Checkout
        uses: actions/checkout@v3
        
      - name: Set up Python Env
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip3 install arxiv requests pyyaml
          
      - name: Run daily arxiv 
        run: |
          python3 daily_arxiv.py
          
      - name: Push reco-arxiv-daily updates
        uses: github-actions-x/commit@v2.9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Github Action: Auto Update Recommendation ArXiv Papers"
          # 提交主 README / docs 以及每日增量文件；publish_wechat 为 true 时可追加 docs/reco-arxiv-daily-wechat.json docs/wechat.md
          files: README.md daily_new.md docs/reco-arxiv-daily.json docs/reco-arxiv-daily-web.json docs/index.md
          rebase: 'true'
          name: ${{ env.GITHUB_USER_NAME }}
          email: ${{ env.GITHUB_USER_EMAIL }}
