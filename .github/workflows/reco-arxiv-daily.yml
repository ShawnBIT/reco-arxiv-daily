# This is a basic workflow to help you get started with Actions

name: Run Arxiv Papers Daily

# Controls when the workflow will run
on:
  # 手动触发：Actions 页选择该 workflow 后 Run workflow
  workflow_dispatch:
  # 每天 00:00 UTC 自动跑（北京时间 08:00）；可改为 0 8 * * * 等
  schedule:
    - cron: "0 0 * * *"
  # Triggers the workflow on push or pull request events only for the main branch
#   push:
#     branches:
#     - main

env:

  GITHUB_USER_NAME: ShawnBIT
  GITHUB_USER_EMAIL: 13269590132@163.com
  
  
# A workflow run is made up of one or more jobs that run sequentially or in parallel
jobs:
  build:
    name: update
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 允许 workflow 向仓库 push 提交

    steps:
      - name: Checkout
        uses: actions/checkout@v3
        
      - name: Set up Python Env
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip3 install arxiv requests pyyaml
          
      - name: Run daily arxiv 
        run: |
          python3 daily_arxiv.py

      - name: Notify WeCom (send daily papers to group)
        if: success() && secrets.WECOM_WEBHOOK_URL != ''
        env:
          WECOM_WEBHOOK_URL: ${{ secrets.WECOM_WEBHOOK_URL }}
        run: |
          pip3 install -q requests
          python3 << 'PY'
          import os, requests

          url = os.environ.get("WECOM_WEBHOOK_URL", "").strip()
          if not url:
              print("WECOM_WEBHOOK_URL not set, skip.")
              exit(0)

          path = "docs/wechat.md"
          if not os.path.isfile(path):
              path = "daily_new.md"
          with open(path, "r", encoding="utf-8") as f:
              content = f.read()

          # 企业微信 markdown 消息内容不超过 4096 字节
          max_len = 3800
          if len(content.encode("utf-8")) > max_len:
              content = content.encode("utf-8")[:max_len].decode("utf-8", errors="ignore")
              content += "\n\n（更多见仓库 docs/wechat.md）"

          payload = {"msgtype": "markdown", "markdown": {"content": content}}
          r = requests.post(url, json=payload, timeout=15)
          print(r.status_code, r.text)
          if r.json().get("errcode") != 0:
              raise SystemExit(1)
          PY

      - name: Push reco-arxiv-daily updates
        uses: github-actions-x/commit@v2.9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Github Action: Auto Update Recommendation ArXiv Papers"
          # 提交主 README / docs / 每日增量；publish_wechat 为 true 时已包含 docs/wechat.md
          files: README.md daily_new.md docs/reco-arxiv-daily.json docs/reco-arxiv-daily-web.json docs/index.md docs/wechat.md
          rebase: 'true'
          name: ${{ env.GITHUB_USER_NAME }}
          email: ${{ env.GITHUB_USER_EMAIL }}
